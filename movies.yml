collections:
  #######################
  #     COLLECTIONS     ##
  #######################
  90 Minute Movies:
    plex_search:
      all:
        duration.gte: 80
        duration.lte: 100
        rating.gte: 7.0
    summary: "Movies approximately 90 minutes long"
    sort_title: "!!0 90 Minutes"
    url_poster: https://img.freepik.com/premium-vector/number-90-logo-monogram-number-90-logo-line-style-usable-anniversary-business-logos_602671-579.jpg?w=360

  Weekly Random Movies:
    template:
      name: random
    plex_search:
      all:
        title.not: "`"
      sort_by: random
      limit: 10
    sort_title: "!!0 Weekly Random"

#############################
#    DYNAMIC COLLECTIONS    #
#############################
dynamic_collections:
  Top Actors:
    type: actor
    template:
      - actor_dynamic
    title_format: <<title>>
    data:
      depth: 3
      minimum: 10
      limit: 30

  Top Directors:
    type: director
    template:
      - director_dynamic
    title_format: <<title>>
    data:
      depth: 1
      minimum: 10
      limit: 15

external_templates:
  - file: Kometa/config/my_templates.yml
