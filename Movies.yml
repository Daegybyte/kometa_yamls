collections:
#######################
#     COLLECTIONS     #
#######################
  90 Minute Movies:
    plex_search:
      all:
        duration.gte: 80
        duration.lte: 100
        rating.gte: 7.0
    summary: "Movies approximately 90 minutes long"
    sort_title: "!!0 90 Minutes"
    url_poster: https://img.freepik.com/premium-vector/number-90-logo-monogram-number-90-logo-line-style-usable-anniversary-business-logos_602671-579.jpg?w=360

  Weekly Random Movies:
    template:
      name: random
    plex_search:
      all:
        title.not: "`"
      sort_by: random
      limit: 10
    sort_title: "!!0 Weekly Random"


#####################
#     TEMPLATES     #
#####################
templates:
  random:
    url_poster: https://raw.githubusercontent.com/TheChrisK/PMM/main/assets/plex/Collections/Weekly%20Random%20Movies/poster.png
    sort_title: "!058_<<collection_name>>"
    summary: "A weekly collection of 10 random movies. Changes every Monday."
    sync_mode: sync
    schedule: weekly(monday)

  actor_dynamic:
    default:
      sort_by: release.desc
    tmdb_person: <<value>>
    url_poster: https://raw.githubusercontent.com/TheChrisK/Kometa-Images/main/Collections/People/<<key_name_encoded>>/poster_acting.png
    sort_title: Actor, <<key_name>>
    schedule: weekly(wednesday)
    smart_filter:
      sort_by: <<sort_by>>
      all:
        actor: tmdb


  director_dynamic:
    default:
      sort_by: release.desc
    tmdb_person: <<value>>
    url_poster: https://raw.githubusercontent.com/TheChrisK/Kometa-Images/main/Collections/People/<<key_name_encoded>>/poster_directing.png
    sort_title: Director, <<key_name>>
    schedule: weekly(wednesday)
    smart_filter:
      sort_by: <<sort_by>>
      all:
        director: tmdb

#############################
#    DYNAMIC COLLECTIONS    #
#############################

dynamic_collections:
  Top Actors:
    type: actor
    template:
      - actor_dynamic
    title_format: <<title>>
    data:
      depth: 3
      minimum: 10
      limit: 30

  Top Directors:
    type: director
    template:
      - director_dynamic
    title_format: <<title>>
    data:
      depth: 1
      minimum: 10
      limit: 15
