###############
## Templates ##
###############
templates:
  #########################
  # Top Episode Template ##
  #########################
  top_episodes:
    sort_title: "zzz <<collection_name>>"
    builder_level: episode
    sync_mode: sync
    collection_order: release.asc
    plex_search:
      type: episode
      sort_by: audience_rating.desc
      limit: <<limit>>
      all:
        title.is: "<<show_title>>"

  ########################
  ## Universe Template ##
  ########################
  universe_collections:
    sort_title: "Universe, <<collection_name>>"
    sync_mode: sync
    collection_order: release.asc

  ##################
  ## Alphabetical ##
  ##################
  basic alphabetical:
    sort_title: "<<prefix>>_<<collection_name>>"
    sync_mode: sync
    collection_mode: hide
    collection_order: alpha
    visible_home: true
    visible_shared: true
    visible_library: true

  random:
    url_poster: https://raw.githubusercontent.com/TheChrisK/PMM/main/assets/plex/Collections/Weekly%20Random%20Movies/poster.png
    sort_title: "!058_<<collection_name>>"
    summary: "A weekly collection of 10 random movies. Changes every Monday."
    sync_mode: sync
    schedule: weekly(monday)

  actor_dynamic:
    default:
      sort_by: release.desc
    tmdb_person: <<value>>
    url_poster: https://raw.githubusercontent.com/TheChrisK/Kometa-Images/main/Collections/People/<<key_name_encoded>>/poster_acting.png
    sort_title: Actor, <<key_name>>
    schedule: weekly(wednesday)
    smart_filter:
      sort_by: <<sort_by>>
      all:
        actor: tmdb

  director_dynamic:
    default:
      sort_by: release.desc
    tmdb_person: <<value>>
    url_poster: https://raw.githubusercontent.com/TheChrisK/Kometa-Images/main/Collections/People/<<key_name_encoded>>/poster_directing.png
    sort_title: Director, <<key_name>>
    schedule: weekly(wednesday)
    smart_filter:
      sort_by: <<sort_by>>
      all:
        director: tmdb
