name: CD - Sync configs to plex

# Deploys YAML configs to the local plex server on push to main.
# Runs on the self-hosted plex runner.
# Fetches the latest changes and hard resets to match the remote,
# ensuring the server is always in sync with the repository.

on:
  push:
    branches: ["main", "master"]

concurrency:
  group: deploy-plex
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, plex]
    steps:
      - name: Sync repo
        run: |
          set -euo pipefail
          cd /home/plex/kometa_yamls
          DEFAULT_BRANCH="$(git remote show origin | sed -n '/HEAD branch/s/.*: //p')"
          git fetch --prune origin
          git checkout "$DEFAULT_BRANCH"
          git reset --hard "origin/$DEFAULT_BRANCH"
