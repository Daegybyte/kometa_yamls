name: CI - Pytest

# Runs pytest with coverage reporting.
# Tests are discovered from the tests/ directory.
# Coverage is measured against helpers/ and must meet a minimum of 99%.
# Fails if any tests fail or coverage drops below the threshold.

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install pytest pytest-cov

      - name: Run tests
        run: pytest --cov=helpers --cov-fail-under=99 tests/
