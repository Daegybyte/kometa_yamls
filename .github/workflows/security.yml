name: CI - Security

# Runs Bandit, a Python security linter.
# Scans helpers/ for common vulnerabilities such as hardcoded passwords,
# unsafe eval usage, and shell injection risks.
# Excludes tests/ to avoid false positives from pytest assert statements.

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  bandit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Bandit
        run: pip install bandit
      - name: Run Bandit
        run: bandit -r helpers/
