name: CI - Lint YML

# Runs yamllint to validate YML syntax and formatting.
# Scans all YML files in the repository.
# Fails if any YML files contain syntax errors or style violations.

on:
  pull_request:
    branches: ["main", "master"]
  push:
    branches: ["main", "master"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install yamllint
        run: |
          python3 -m pip install --upgrade pip
          pip install yamllint
      - name: Lint
        run: yamllint .
